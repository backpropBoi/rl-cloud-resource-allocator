env:
  max_workers: 20
  min_workers: 1
  # Higher arrival rate (~capacity limit) forces meaningful scaling decisions
  arrival_rate: 8.0
  # Smaller queue means jobs drop quickly — reactive policies get punished
  max_queue: 40
  episode_length: 500
  jobs_per_worker: 2
  scale_up_delay: 2
  scale_down_cooldown: 5
  workload: mixed  # steady | burst | spike | mixed (randomises per episode)
  seed: 42

reward:
  throughput_weight: 1.5
  resource_cost_per_worker: 0.1
  sla_penalty_weight: 0.5
  latency_penalty_weight: 0.05
  # Heavy overflow penalty — dropped jobs clearly separate good from bad policies
  overflow_penalty_weight: 2.0
  scaling_penalty_weight: 0.01
  sla_queue_threshold_ratio: 0.4

training:
  total_timesteps: 500000
  learning_rate: 0.0003
  buffer_size: 300000
  batch_size: 256
  learning_starts: 2000
  n_envs: 4
  checkpoint_freq: 50000
  eval_freq: 5000
  eval_episodes: 5
  seed: 42
  use_vec_normalize: true

paths:
  model_dir: ./models
  log_dir: ./logs
  tensorboard_dir: ./logs/tensorboard
