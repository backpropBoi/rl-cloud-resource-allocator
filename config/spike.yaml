env:
  max_workers: 20
  min_workers: 1
  arrival_rate: 3.0
  max_queue: 100
  episode_length: 500
  jobs_per_worker: 2
  # Faster scale-up for spike workload to react to sudden surges
  scale_up_delay: 2
  scale_down_cooldown: 5
  workload: spike
  seed: 42

reward:
  throughput_weight: 1.0
  # Lower resource cost: accept higher worker count to survive spikes
  resource_cost_per_worker: 0.03
  sla_penalty_weight: 0.2
  latency_penalty_weight: 0.015
  # Very high overflow penalty: spike drops are especially costly
  overflow_penalty_weight: 1.0
  scaling_penalty_weight: 0.005
  sla_queue_threshold_ratio: 0.4

training:
  total_timesteps: 500000
  learning_rate: 0.0003
  buffer_size: 200000
  batch_size: 256
  learning_starts: 1000
  n_envs: 4
  checkpoint_freq: 50000
  eval_freq: 10000
  eval_episodes: 5
  seed: 42
  use_vec_normalize: true

paths:
  model_dir: ./models/spike
  log_dir: ./logs/spike
  tensorboard_dir: ./logs/spike/tensorboard
